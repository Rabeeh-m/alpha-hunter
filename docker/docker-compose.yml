name: alpha-hunter

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: alpha_hunter
      POSTGRES_PASSWORD: alpha_hunter
      POSTGRES_DB: alpha_hunter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha_hunter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: